name: Buscar noticias sobre ELA

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  buscar-noticias:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Buscar noticias
        run: python scripts/buscar_noticias_ela.py

      - name: Configurar Git
        run: |
          git config user.name "alatrixte-svg"
          git config user.email "github-actions@github.com"

      - name: Guardar candidate-news.json
        run: |
          git add candidate-news.json

          if git diff --cached --quiet; then
            echo "No hay cambios que guardar"
          else
            git commit -m "Actualiza noticias candidatas sobre ELA"
            git push https://x-access-token:${{ secrets.ACTIONS_PUSH_TOKEN }}@github.com/alatrixte-svg/javiweb.git HEAD:main
          fi
